name: Extract WordPress Hooks

on:
  push:
    branches: [main, master]
    paths: ["**.php"]
  workflow_dispatch:

jobs:
  extract-hooks:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: akirk/extract-wp-hooks@main
